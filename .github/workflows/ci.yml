name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  phpcs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
      - run: composer install --prefer-dist --no-progress
      - run: composer lint

  phpunit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: pediment-ai
      - uses: actions/checkout@v4
        with:
          repository: Bergert-Digital/pediment
          ref: development
          token: ${{ secrets.STARTER_THEME_PAT }}
          path: pediment
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pediment-ai/package-lock.json
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
      - name: Build pediment theme blocks
        run: |
          cd pediment
          npm ci
          npm run build
      - name: Install plugin deps
        run: |
          cd pediment-ai
          composer install --prefer-dist --no-progress
          npm ci
      - name: Start wp-env (mounts both)
        run: cd pediment-ai && npm run env:start
      - name: Run PHPUnit
        run: cd pediment-ai && npx wp-env run tests-wordpress --env-cwd=wp-content/plugins/pediment-ai ./vendor/bin/phpunit
      - if: always()
        run: cd pediment-ai && npm run env:stop

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: pediment-ai
      - uses: actions/checkout@v4
        with:
          repository: Bergert-Digital/pediment
          ref: development
          token: ${{ secrets.STARTER_THEME_PAT }}
          path: pediment
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pediment-ai/package-lock.json
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
      - run: cd pediment && npm ci && npm run build
      - run: cd pediment-ai && composer install --prefer-dist --no-progress && npm ci
      - run: cd pediment-ai && npx playwright install --with-deps chromium
      - run: cd pediment-ai && npm run env:start
      - run: cd pediment-ai && npm run build
      - run: cd pediment-ai && npm run e2e
      - if: always()
        run: cd pediment-ai && npm run env:stop
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: pediment-ai/playwright-report/
