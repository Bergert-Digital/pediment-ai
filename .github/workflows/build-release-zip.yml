name: Build release zip

# Reusable workflow: checks out a tag, installs prod Composer deps (so the
# plugin-update-checker vendor/ ships), builds the JS bundle, patches the
# version into plugin.php (header + PEDIMENT_AI_VERSION) and package.json, packs
# a version-less pediment-ai.zip via rsync + .distignore, and uploads it to the
# matching GitHub Release.
#
# Called from release-please.yml (automatic when release-please publishes a
# release) and release.yml (workflow_dispatch fallback for re-attaching).
#
# The asset filename is intentionally version-less so the GitHub download URL is
# stable (/releases/download/v<X.Y.Z>/pediment-ai.zip) and the canonical
# pediment-ai/ plugin slug is preserved.

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag to build pediment-ai.zip for (e.g. v0.2.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  attach-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Composer prod dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-progress

      - name: Build JS bundle
        run: |
          npm ci
          npm run build

      - name: Patch version into plugin.php and package.json
        env:
          TAG: ${{ inputs.tag }}
        run: |
          VERSION="${TAG#v}"
          sed -i -E "s/^([[:space:]]*\*[[:space:]]*Version:[[:space:]]+).+$/\1$VERSION/" plugin.php
          sed -i -E "s/(define\([[:space:]]*'PEDIMENT_AI_VERSION',[[:space:]]*')[^']*('[[:space:]]*\))/\1$VERSION\2/" plugin.php
          VERSION="$VERSION" node -e "const p=require('./package.json');p.version=process.env.VERSION;require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
          grep -E "Version:|PEDIMENT_AI_VERSION" plugin.php
          grep '"version"' package.json

      - name: Build distributable zip
        run: |
          STAGE="$(mktemp -d)/pediment-ai"
          mkdir -p "$STAGE"
          rsync -a --exclude-from=.distignore ./ "$STAGE/"
          ( cd "$(dirname "$STAGE")" && zip -rq "$GITHUB_WORKSPACE/pediment-ai.zip" pediment-ai )
          unzip -l "pediment-ai.zip" | tail -5

      - name: Upload zip to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: gh release upload "$TAG" pediment-ai.zip --clobber
